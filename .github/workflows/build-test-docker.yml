name: MomOi CI/CD Pipeline

on:
  push:
    branches: [ "main", "master", "develop" ]
  pull_request:
    branches: [ "main", "master", "develop" ]

jobs:
  build-and-test:
    name: Build & Run Unit Tests
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Setup .NET SDK
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '8.0.x'

    - name: Restore NuGet Packages
      run: |
        & "C:\Program Files\dotnet\dotnet.exe" restore MomOi.sln || dotnet restore MomOi.sln

    - name: Build Solution
      run: |
        & "C:\Program Files\dotnet\dotnet.exe" build MomOi.sln --no-restore --configuration Release || dotnet build MomOi.sln --no-restore --configuration Release

    - name: Execute Tests
      run: |
        & "C:\Program Files\dotnet\dotnet.exe" test MomOi.Tests/MomOi.Tests.csproj --no-build --configuration Release --verbosity normal || dotnet test MomOi.Tests/MomOi.Tests.csproj --no-build --configuration Release --verbosity normal

  docker-build-push:
    name: Package Docker Image
    needs: build-and-test
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Log in to GitHub Container Registry
      uses: docker/login-action@v3
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Extract Repository Name Lowercase
      id: repo-name
      run: echo "repo=${GITHUB_REPOSITORY,,}" >> $GITHUB_OUTPUT

    - name: Build and Push Docker Image
      uses: docker/build-push-action@v5
      with:
        context: .
        file: MomOi.API/Dockerfile
        push: true
        tags: |
          ghcr.io/${{ steps.repo-name.outputs.repo }}/momoi-api:latest
          ghcr.io/${{ steps.repo-name.outputs.repo }}/momoi-api:${{ github.sha }}
        cache-from: type=gha
        cache-to: type=gha,mode=max
