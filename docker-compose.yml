version: '3.8'

services:
  momoi-api:        # ASP.NET Core 8 backend
    build:
      context: .
      dockerfile: MomOi.API/Dockerfile
    ports:
      - "8000:80"
    environment:
      - ConnectionStrings__DefaultConnection=Host=pgdb;Port=5432;Database=MomOiDb;Username=postgres;Password=postgres;
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - NutritionApiUrl=http://nutrition-api:8001
      - RunMigrationsOnStartup=true
      - EnableSwagger=true
    depends_on:
      - pgdb

  nutrition-api:    # Python FastAPI (USDA engine)
    build:
      context: .
      dockerfile: MomOi.NutritionAPI/Dockerfile
    ports:
      - "8001:8001"
    environment:
      - USDA_API_KEY=${USDA_API_KEY}
      - DATABASE_URL=postgresql://postgres:postgres@pgdb:5432/nutrition_db
    depends_on:
      - pgdb

  pgdb:             # PostgreSQL database (dùng chung cho cả C# API và Python API)
    image: postgres:15-alpine
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=MomOiDb
    volumes:
      - pgdb_data:/var/lib/postgresql/data

  frontend:         # React app
    build:
      context: .
      dockerfile: mom-oi-frontend/Dockerfile
    ports:
      - "3000:80"
    depends_on:
      - momoi-api

volumes:
  pgdb_data:
